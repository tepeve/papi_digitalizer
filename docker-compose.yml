services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_server
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # NUEVO: Healthcheck para validar que la API responde
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  papi-digitalizer:
    build: .
    container_name: papi_app
    depends_on:
      ollama:
        condition: service_healthy # NUEVO: Espera al healthcheck
    volumes:
      - ./data:/app/data
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - DEBUG_MODE=1 # Sugerido para la primera prueba
      - CLEAN_SCANS=0  # Cambiar a 1 en producción si los PDFs vienen muy ruidosos