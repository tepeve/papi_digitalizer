services:
  # Servicio LLM independiente con acceso a GPU
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_server
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama  # Volumen para persistir los pesos del modelo
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Tu aplicación batch
  papi-digitalizer:
    build: .
    container_name: papi_app
    depends_on:
      - ollama
    volumes:
      - ./data:/app/data  # Solo mapeamos los datos, el código ya está dentro de la imagen
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - DEBUG_MODE=0
    # Quitamos 'command: tail...' para que ejecute el main.py de tu Dockerfile y se apague al terminar.

volumes:
  ollama_data: